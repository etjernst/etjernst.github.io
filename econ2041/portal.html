<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ECON2041 portal</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f1e8; --ink: #241f1a; --muted: #8a8175; --accent: #76232f;
    --surface: #fffdf8; --rule: #e6ddcd; --gold: #c9a24b; --truth: #0f7a63;
  }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5;
         -webkit-font-smoothing: antialiased; }
  .card { max-width: 460px; margin: 4vh auto 8vh; background: var(--surface);
          border: 1px solid #ece3d3; border-radius: 10px;
          padding: 24px; box-shadow: 0 1px 2px rgba(60,40,20,.06); }
  h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.015em; margin: 0 0 14px; }
  input[type=text], input[type=number] {
    width: 100%; font-size: 1.1rem; padding: 12px; font-family: inherit; color: var(--ink);
    background: var(--surface); min-height: 44px;
    border: 1px solid var(--rule); border-radius: 8px; margin: 8px 0 12px; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 26px;
    background: transparent; margin: 10px 0 4px; cursor: pointer; accent-color: var(--accent); }
  input[type=range]::-webkit-slider-runnable-track { height: 6px; border-radius: 99px; background: var(--rule); }
  input[type=range]::-moz-range-track { height: 6px; border-radius: 99px; background: var(--rule); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
    width: 24px; height: 24px; border-radius: 50%; background: var(--accent); margin-top: -9px;
    box-shadow: 0 1px 4px rgba(0,0,0,.35); }
  input[type=range]::-moz-range-thumb { width: 24px; height: 24px; border: 0; border-radius: 50%;
    background: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.35); }
  button { width: 100%; font-size: 1.02rem; font-weight: 700; padding: 13px; border: 0;
           border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer;
           margin-top: 4px; font-family: inherit; min-height: 44px; letter-spacing: .01em; }
  button:active { transform: translateY(1px); }
  button:disabled { background: #d8c3c6; color: #fff; cursor: default; }
  button.ghost { background: var(--bg); color: var(--accent); border: 1px solid var(--rule); }
  .badge { display: inline-block; background: var(--bg); border: 1px solid var(--rule);
           border-radius: 8px; padding: 4px 10px;
           font-family: ui-monospace, monospace; font-size: .92rem; color: var(--ink); margin-bottom: 10px; }
  #status.err { color: var(--accent); font-weight: 600; margin-top: 12px; }
  #status.busy { color: var(--muted); margin-top: 12px; }
  .muted { color: var(--muted); font-size: .95rem; }
  .round { border: 1px solid var(--rule); border-radius: 10px; padding: 16px; margin: 14px 0;
           background: var(--surface); }
  .round-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .round-label { font-weight: 600; }
  .prompt { font-size: 1.05rem; margin: 6px 0 10px; }
  .chip { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; font-weight: 700;
          border-radius: 99px; padding: 3px 10px; white-space: nowrap; }
  .chip-open { background: rgba(15,122,99,.12); color: var(--truth); }
  .chip-closed { background: rgba(201,162,75,.22); color: #8a6a1f; }
  .chip-revealed { background: rgba(118,35,47,.12); color: var(--accent); }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opts .opt { background: var(--bg); color: var(--ink); text-align: left; padding: 12px 14px;
               border: 1px solid var(--rule); font-weight: 600; }
  .opts .opt.picked { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mine { margin: 6px 0; }
  .result { margin-top: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .bar-row .bar-label { flex: 0 0 38%; font-size: .92rem; }
  .bar-row .bar { display: inline-block; height: 14px; background: var(--gold); border-radius: 4px; }
  .bar-row.mine-row .bar { background: var(--accent); }
  .bar-row .bar-n { font-size: .9rem; color: var(--muted); }
  canvas { width: 100%; height: auto; margin-top: 6px; }
  .note { background: #efe9dc; border-radius: 8px; padding: 10px 12px;
          font-size: .95rem; margin: 12px 0; }
  .field { margin: 14px 0; }
  .field-label { font-weight: 600; font-size: .98rem; margin: 0 0 4px; }
  .field-err { color: var(--accent); font-weight: 600; font-size: .9rem; margin: 4px 0 0; min-height: 0; }
  .field-err:empty { display: none; }
  .help { color: var(--muted); font-size: .88rem; margin: 2px 0 6px; }
  .vig { border: 1px dashed var(--rule); border-radius: 10px; padding: 12px 14px; margin: 14px 0; }
  .vig-title { font-weight: 600; margin: 0 0 6px; }
  .vig ul { margin: 6px 0 10px; padding-left: 18px; }
  .vig li { font-size: .95rem; margin: 2px 0; }
  .progress { margin: 12px 0 2px; }
  .form-summary p { margin: 3px 0; font-size: .93rem; }
  .screen-marker { margin: 0 0 10px; font-size: .85rem; }
  .nav-row { display: flex; gap: 8px; }
  .nav-row .half { width: auto; flex: 1; }
  /* wage-style rounds: compact slider rows and reveal legend marks */
  .drow { padding: 12px 0; border-top: 1px solid var(--rule); }
  .drow:first-of-type { border-top: 0; }
  .drow-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .dname { font-size: .98rem; font-weight: 600; }
  .dval { font-size: 1.05rem; font-weight: 800; color: var(--accent);
          font-variant-numeric: tabular-nums; }
  .dval.empty { color: var(--muted); font-weight: 600; }
  .mark-you, .mark-med, .mark-truth { display: inline-block; width: 11px; height: 11px;
      vertical-align: -1px; }
  .mark-you { border: 2.5px solid var(--accent); border-radius: 50%; background: transparent; }
  .mark-med { border-radius: 50%; background: var(--accent); }
  .mark-truth { background: var(--truth); transform: rotate(45deg); border-radius: 2px; }
  @media (min-width: 480px) {
    .card { max-width: 520px; }
  }
</style>
</head>
<body>
<div class="card">
  <h1>ECON2041 portal</h1>

  <div id="seed-section" style="display:none">
    <p>Enter your personal code (it was sent to you on iLearn).</p>
    <input id="seed-input" type="text" autocomplete="off" autocapitalize="characters" placeholder="e.g. K7KQ3M">
    <button onclick="PORTAL.saveSeedFromInput()">Save code</button>
  </div>

  <div id="home-section" style="display:none">
    <span class="badge" id="seed-badge"></span>
    <div id="rounds"></div>
    <button class="ghost" onclick="PORTAL.boot()">Refresh</button>
  </div>

  <div id="status"></div>
</div>

<script>
  // Set once at deploy time: the Apps Script web app URL (ends in /exec).
  window.AGG_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzXHmTGnRXYJ6La5t1LBELctAbnKodoW-pfZflYI1_tcUHWKoca3LAtY4GKshbF-CJgRw/exec';
</script>
<script src="js/transport.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
